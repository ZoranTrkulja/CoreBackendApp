services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: core-sql-db
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=Zoran2025!
    ports:
      - "1433:1433"

  api:
    image: corebackendapp
    build: .
    container_name: core-api-service
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      # Note: We use 'db' (the service name) as the server address instead of host.docker.internal
      - ConnectionStrings__DefaultConnection=Server=db;Database=CoreBackendAppDb;User Id=sa;Password=Zoran2025!;TrustServerCertificate=True;Encrypt=False;
      - Jwt__Key=YourSuperSecretKeyThatIsVeryLong123!
      - ASPNETCORE_ENVIRONMENT=Development